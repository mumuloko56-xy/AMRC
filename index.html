<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American — Links Oficiais</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #ffffff;
        }
        p {
            margin-bottom: 30px;
            color: #aaaaaa;
        }
        .btn {
            display: block;
            background: #1da1f2;
            color: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #1991db;
        }
        /* Cores diferentes para cada botão se quiser */
        .discord { background: #5865F2; }
        .youtube { background: #FF0000; }
        .instagram { background: #E1306C; }
        .loja { background: #00FF00; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AMERICAN</h1>
        <p>Links Oficiais — Discord, YouTube e muito mais!</p>
        
        <a href="COLOQUE_SEU_LINK_AQUI" class="btn discord">DISCORD</a>
        <a href="COLOQUE_SEU_LINK_AQUI" class="btn youtube">YOUTUBE</a>
        <a href="COLOQUE_SEU_LINK_AQUI" class="btn instagram">INSTAGRAM</a>
        <a href="COLOQUE_SEU_LINK_AQUI" class="btn loja">LOJA DO BRAZUCAS</a>
    </div>
</body>
</html>
